<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{title}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            margin: 0;
            padding: 0;
            background: #ffffff;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 420px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
        }
        .logo {
            height: 32px;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: #1a1a1a;
        }
        .subtitle {
            font-size: 13px;
            color: #888;
            margin: 0 0 32px 0;
            line-height: 1.5;
        }
        .subtitle a {
            color: #5ce0c2;
            text-decoration: none;
        }
        .subtitle a:hover {
            text-decoration: underline;
        }
        .form-group {
            position: relative;
            margin-bottom: 16px;
        }
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            font-family: inherit;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        input[type="password"]:focus {
            border-color: #5ce0c2;
            background: #ffffff;
        }
        button {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #5ce0c2;
            color: #1a1a1a;
        }
        .remember {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            font-size: 12px;
            color: #888;
        }
        .remember input[type="checkbox"] {
            accent-color: #5ce0c2;
        }
        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>

        <h1>{title}</h1>
        <p class="subtitle">{instructions}</p>

        <form id="staticrypt-form" action="#" method="post">
            <div class="form-group">
                <input id="staticrypt-password" type="password" name="password" placeholder="Enter key" autofocus>
            </div>
            <button type="submit">Unlock</button>
            <label class="remember">
                <input id="staticrypt-remember" type="checkbox" name="remember" checked>
                Remember me for 30 days
            </label>
            <p id="staticrypt-error" class="error">Incorrect key. Please try again.</p>
        </form>
