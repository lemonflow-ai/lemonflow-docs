name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets exist
        run: |
          if [ -z "$TECH_KEY" ] || [ -z "$OPS_KEY" ]; then
            echo "::error::Missing encryption secrets. LEMONFLOW_DOCS_TECH_KEY and LEMONFLOW_DOCS_OPERATIONS_KEY must be set. Aborting to prevent unencrypted deployment."
            exit 1
          fi
          echo "Secrets verified."
        env:
          TECH_KEY: ${{ secrets.LEMONFLOW_DOCS_TECH_KEY }}
          OPS_KEY: ${{ secrets.LEMONFLOW_DOCS_OPERATIONS_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r protected _site/
          # Shared docs: copy into both protected folders so each gets encrypted with its own key
          cp _site/protected/integration/integration-requirements.html _site/protected/operations/integration-requirements.html

      - name: Encrypt integration docs
        run: |
          mkdir -p /tmp/encrypted-integration
          staticrypt _site/protected/integration/*.html \
            -p "$INTEGRATION_KEY" \
            --short \
            -f password-template.html \
            --template-title "Lemonflow — Technical Documentation" \
            --template-instructions "This document is restricted to technical integration partners.<br>If your key is not accepted, you may not have access to this section.<br>Contact <a href='mailto:tech@lemonflow.ai'>tech@lemonflow.ai</a> for credentials." \
            --remember 30 \
            -d /tmp/encrypted-integration
          cp /tmp/encrypted-integration/*.html _site/protected/integration/
        env:
          INTEGRATION_KEY: ${{ secrets.LEMONFLOW_DOCS_TECH_KEY }}

      - name: Encrypt operations docs
        run: |
          mkdir -p /tmp/encrypted-operations
          staticrypt _site/protected/operations/*.html \
            -p "$OPERATIONS_KEY" \
            --short \
            -f password-template.html \
            --template-title "Lemonflow — Operations Documentation" \
            --template-instructions "This document is restricted to operations partners.<br>If your key is not accepted, you may not have access to this section.<br>Contact <a href='mailto:tech@lemonflow.ai'>tech@lemonflow.ai</a> for credentials." \
            --remember 30 \
            -d /tmp/encrypted-operations
          cp /tmp/encrypted-operations/*.html _site/protected/operations/
        env:
          OPERATIONS_KEY: ${{ secrets.LEMONFLOW_DOCS_OPERATIONS_KEY }}

      - name: Verify encryption
        run: |
          for file in _site/protected/integration/*.html _site/protected/operations/*.html; do
            [ -f "$file" ] || continue
            if ! grep -q "staticrypt" "$file"; then
              echo "::error::$file was NOT encrypted. Aborting deployment."
              exit 1
            fi
          done
          echo "All protected files verified as encrypted."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
